<!DOCTYPE HTML>
<html>
<head>
  <title>Website Preview</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f4f4; color: #222; }
    .preview-bar { position: sticky; top: 0; z-index: 9999; background: #222; color: #fff; padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .preview-bar strong { margin-right: 8px; }
    .preview-bar button, .preview-bar a { border: 0; background: #4c5c96; color: #fff; padding: 8px 12px; border-radius: 4px; text-decoration: none; cursor: pointer; font-size: 14px; }
    .preview-bar button:hover, .preview-bar a:hover { background: #5f72b7; }
    iframe { width: 100%; height: calc(100vh - 58px); border: 0; display: block; background: #fff; }
  </style>
</head>
<body>
  <div class="preview-bar">
    <strong>Website Preview</strong>
    <button onclick="preview.src='home.html'">Home</button>
    <button onclick="preview.src='about.html'">About</button>
    <button onclick="preview.src='index.html'">Classes</button>
    <button onclick="preview.src='events.html'">Events</button>
    <a href="home.html" target="_blank">Open Home in New Tab</a>
  </div>
  <iframe id="preview" name="preview" src="index.html" title="Website preview"></iframe>
</body>
</html>
